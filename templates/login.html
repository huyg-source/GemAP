<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — DM Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #1a1a2e;
      --panel:    #16213e;
      --panel2:   #0f3460;
      --accent:   #e94560;
      --text:     #e0e0e0;
      --text-dim: #8899aa;
      --border:   #2a2a4a;
      --input-bg: #0d1b2a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .back-link {
      position: fixed;
      top: 20px; left: 24px;
      font-size: .85rem;
      color: var(--text-dim);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 44px 48px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: -.3px;
    }
    .logo span { color: var(--text-dim); }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      font-size: .85rem;
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    input[type="email"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      margin-bottom: 20px;
    }
    .btn:hover { opacity: .88; }
    .error {
      background: rgba(233,69,96,.12);
      border: 1px solid rgba(233,69,96,.45);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: .85rem;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .divider {
      text-align: center;
      font-size: .8rem;
      color: var(--text-dim);
      margin: 4px 0 16px;
    }
    .divider a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .gm-link {
      display: block;
      text-align: center;
      margin-top: 28px;
      font-size: .75rem;
      color: #444;
      text-decoration: none;
    }
    .gm-link:hover { color: var(--text-dim); }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Back</a>
  <div class="box">
    <div class="logo">DM<span>Session</span></div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to your account to continue</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com"
             autofocus autocomplete="email" value="{{ request.form.get('email','') }}">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••"
             autocomplete="current-password">

      <button class="btn" type="submit">Log In</button>
    </form>

    <div class="divider">
      Don't have an account? <a href="/signup">Sign up free</a>
    </div>

    <a class="gm-link" href="/gm/login">GM backdoor access</a>
  </div>
</body>
</html>
