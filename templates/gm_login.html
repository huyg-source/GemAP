<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM Session — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #1a1a2e;
      --panel:    #16213e;
      --panel2:   #0f3460;
      --accent:   #e94560;
      --text:     #e0e0e0;
      --text-dim: #888;
      --border:   #2a2a4a;
      --input-bg: #0d1b2a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 48px;
      width: 360px;
      text-align: center;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: .85rem;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    button[type="submit"] {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .85; }
    .error {
      background: rgba(233,69,96,.15);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: .85rem;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .shield { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="shield">🛡️</div>
    <div class="login-title">Dungeon Master</div>
    <div class="login-sub">Game Master access required</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="GM Password"
             autofocus autocomplete="current-password">
      <button type="submit">Enter the Session</button>
    </form>
  </div>
</body>
</html>
