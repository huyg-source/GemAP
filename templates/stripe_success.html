<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Active — DM Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#1a1a2e; --panel:#16213e; --accent:#e94560; --text:#e0e0e0; --text-dim:#8899aa; --border:#2a2a4a; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .box {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 56px 48px; max-width: 440px; width: 100%; text-align: center;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--text-dim); font-size: .95rem; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 13px 32px;
      background: var(--accent); color: #fff; border-radius: 8px;
      font-weight: 700; text-decoration: none; font-size: .95rem;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎲</div>
    <h1>You're a DM Pro!</h1>
    <p>Your subscription is active. Unlimited campaigns, unlimited characters — the table is yours.</p>
    <a class="btn" href="/dm/">Open DM Session →</a>
  </div>
</body>
</html>
